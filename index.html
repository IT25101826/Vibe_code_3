<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Toolkit - UCSC</title>
    <style>
        /* make layouts easier to manage */
        *, *::before, *::after {
            box-sizing: border-box;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        nav {
            width: 100%;
            background-color: #6e1919;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        nav .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        nav .logo {
            width: 50px;
            height: 50px;
            background-color: #fdb913;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #6e1919;
            font-size: 24px;
        }
        nav .nav-left h1 {
            margin: 0;
            font-size: 1.5em;
        }
        nav .nav-right button {
            margin-left: 10px;
            background-color: #fdb913;
            color: #6e1919;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        nav .nav-right button:hover {
            background-color: #fff5e6;
            transform: scale(1.05);
        }
        /* toggle switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-left: 10px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #fdb913;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        /* dark mode styles */
        body.dark-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        body.dark-mode nav {
            background-color: #4a1010;
            color: #e0e0e0;
        }
        body.dark-mode nav .nav-right button {
            background-color: #fdb913;
            color: #4a1010;
        }
        body.dark-mode nav .nav-right button:hover {
            background-color: #fff5e6;
            color: #4a1010;
        }
        body.dark-mode .sidebar {
            background-color: #2a2a2a;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
        }
        body.dark-mode .sidebar h2 {
            color: #fdb913;
        }
        body.dark-mode .event {
            background-color: #333;
            color: #e0e0e0;
        }
        body.dark-mode .event:hover {
            background-color: #3d2a1a;
            box-shadow: 0 0 15px rgba(253, 185, 19, 0.3);
        }
        body.dark-mode .timer-card {
            background: #1f1f1f;
            color: #e0e0e0;
        }
        body.dark-mode .timer-display {
            color: #fdb913;
        }
        .page-container {
            display: flex;
            flex: 1;
            width: 100%;
        }
        .sidebar {
            width: 250px;
            background-color: white;
            padding: 20px;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease forwards;
        }
        .sidebar h2 {
            color: #6e1919;
            margin-top: 0;
            border-bottom: 3px solid #fdb913;
            padding-bottom: 10px;
        }
        .event {
            background-color: #f9f9f9;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border-left: 4px solid #fdb913;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .event:hover {
            background-color: #fff5e6;
            box-shadow: 0 0 15px rgba(253, 185, 19, 0.4);
            transform: translateX(5px);
        }
        main {
            flex: 1;
            margin-top: 30px;
            margin-left: 20px;
            margin-right: 20px;
            max-width: 600px;
            animation: fadeIn 0.8s ease forwards;
        }
        main section {
            animation: fadeIn 0.6s ease forwards;
        }
        .form-group {
            margin-bottom: 15px;
        }
        select, textarea {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            font-size: 1em;
            border-radius: 10px;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        button {
            background-color: #6e1919;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1em;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #4a1010;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(110, 25, 25, 0.3);
        }
        .course {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .course label {
            display: flex;
            flex-direction: column;
        }
        .course input, .course select {
            margin-top: 0.25rem;
        }
        /* Timer Styles */
        .timer-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            margin: 30px auto;
        }
        .timer-card h2 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #333;
            font-weight: 600;
        }
        .timer-display {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 32px;
            letter-spacing: 2px;
            color: #6e1919;
            font-variant-numeric: tabular-nums;
            animation: pulseTimer 2s ease-in-out infinite;
        }
        .timer-display.running {
            animation: pulseTimer 1.5s ease-in-out infinite;
            color: #fdb913;
        }
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .timer-btn {
            background: #6e1919;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 80px;
        }
        .timer-btn:hover:not(:disabled) {
            background: #4a1010;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(110, 25, 25, 0.3);
        }
        .timer-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .timer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .timer-btn.pause-btn {
            background: #fdb913;
            color: #6e1919;
        }
        .timer-btn.pause-btn:hover:not(:disabled) {
            background: #fff5e6;
            color: #6e1919;
        }
        @keyframes pulseTimer {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }
        
        /* responsive adjustments for tablets and phones */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: flex-start;
            }
            nav .nav-right {
                margin-top: 10px;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .logo {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .page-container {
                flex-direction: column-reverse; /* sidebar on top */
            }
            .sidebar {
                width: 100%;
                padding: 15px;
                box-shadow: none;
            }
            main {
                margin: 20px 10px;
                max-width: 100%;
            }
            .timer-card {
                padding: 20px;
                max-width: 100%;
            }
        }
        @media (max-width: 480px) {
            nav .nav-right button {
                padding: 6px 10px;
                font-size: 0.9em;
            }
            .timer-display {
                font-size: 48px;
            }
            .form-group label,
            .course label {
                font-size: 0.9em;
            }
        }
    
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <div class="logo">🐐</div>
            <h1>Student Toolkit</h1>
        </div>
        <div class="nav-right">
            <button id="gpa-btn">GPA Calculator</button>
            <button id="timer-btn">Study Timer</button>
            <button id="idea-btn">Idea Board</button>
            <!-- dark mode toggle -->
            <label class="switch" title="Toggle dark mode">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </nav>
    <div class="page-container">
        <aside class="sidebar">
            <h2>📅 Upcoming Events</h2>
            <div class="event">Midterm Exam - March 15</div>
            <div class="event">Project Deadline - March 22</div>
            <div class="event">Final Review - April 5</div>
            <div class="event">Summer Workshop - April 20</div>
        </aside>
        <main>
        <section id="idea-section">
            <h2>Group idea board</h2>
            <div class="form-group">
                <label for="member-select">Choose a team member:</label>
                <select id="member-select">
                    <option value="">--Select--</option>
                    <option>Member 1</option>
                    <option>Member 2</option>
                    <option>Member 3</option>
                    <option>Member 4</option>
                    <option>Member 5</option>
                    <option>Member 6</option>
                    <option>Member 7</option>
                    <option>Member 8</option>
                    <option>Member 9</option>
                    <option>Member 10</option>
                </select>
            </div>
            <div class="form-group">
                <label for="idea-box">Your idea:</label>
                <textarea id="idea-box" placeholder="Enter your idea here."></textarea>
                <button id="add-idea" style="margin-top: 10px;">Add idea</button>
                <button id="clear-ideas" style="margin-top: 10px; margin-left: 10px;">Clear All Ideas</button>
            </div>
            <div id="idea-count" style="margin-top:15px;font-weight:bold;">Total ideas: 0</div>
            <ul id="idea-list"></ul>
        </section>
        <section id="gpa-section" style="display: none;">
            <h2>GPA Calculator</h2>
            <div id="courses">
                <div class="course">
                    <label>Credits: <input type="number" class="credits" min="0" step="0.5"></label>
                    <label>Grade: 
                        <select class="grade">
                            <option value="4.0">A</option>
                            <option value="3.7">A-</option>
                            <option value="3.3">B+</option>
                            <option value="3.0">B</option>
                            <option value="2.7">B-</option>
                            <option value="2.3">C+</option>
                            <option value="2.0">C</option>
                            <option value="1.7">C-</option>
                            <option value="1.3">D+</option>
                            <option value="1.0">D</option>
                            <option value="0.7">D-</option>
                            <option value="0.0">F</option>
                        </select>
                    </label>
                </div>
                <div class="course">
                    <label>Credits: <input type="number" class="credits" min="0" step="0.5"></label>
                    <label>Grade: 
                        <select class="grade">
                            <option value="4.0">A</option>
                            <option value="3.7">A-</option>
                            <option value="3.3">B+</option>
                            <option value="3.0">B</option>
                            <option value="2.7">B-</option>
                            <option value="2.3">C+</option>
                            <option value="2.0">C</option>
                            <option value="1.7">C-</option>
                            <option value="1.3">D+</option>
                            <option value="1.0">D</option>
                            <option value="0.7">D-</option>
                            <option value="0.0">F</option>
                        </select>
                    </label>
                </div>
                <div class="course">
                    <label>Credits: <input type="number" class="credits" min="0" step="0.5"></label>
                    <label>Grade: 
                        <select class="grade">
                            <option value="4.0">A</option>
                            <option value="3.7">A-</option>
                            <option value="3.3">B+</option>
                            <option value="3.0">B</option>
                            <option value="2.7">B-</option>
                            <option value="2.3">C+</option>
                            <option value="2.0">C</option>
                            <option value="1.7">C-</option>
                            <option value="1.3">D+</option>
                            <option value="1.0">D</option>
                            <option value="0.7">D-</option>
                            <option value="0.0">F</option>
                        </select>
                    </label>
                </div>
                <div class="course">
                    <label>Credits: <input type="number" class="credits" min="0" step="0.5"></label>
                    <label>Grade: 
                        <select class="grade">
                            <option value="4.0">A</option>
                            <option value="3.7">A-</option>
                            <option value="3.3">B+</option>
                            <option value="3.0">B</option>
                            <option value="2.7">B-</option>
                            <option value="2.3">C+</option>
                            <option value="2.0">C</option>
                            <option value="1.7">C-</option>
                            <option value="1.3">D+</option>
                            <option value="1.0">D</option>
                            <option value="0.7">D-</option>
                            <option value="0.0">F</option>
                        </select>
                    </label>
                </div>
            </div>
            <button id="calculate-gpa">Calculate GPA</button>
            <p id="gpa-result">GPA: 0</p>
        </section>
        <section id="timer-section" style="display: none; text-align: center;">
            <div class="timer-card">
                <h2>⏳ Study Timer</h2>
                <div id="timerDisplay" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="startBtn" class="timer-btn">Start</button>
                    <button id="pauseBtn" class="timer-btn pause-btn">Pause</button>
                    <button id="resetBtn" class="timer-btn">Reset</button>
                </div>
            </div>
        </section>
    </main>
    </div>
    <script>
        const ideaBox = document.getElementById('idea-box');
        const addButton = document.getElementById('add-idea');
        // const clearButton = document.getElementById('clear-input'); // no longer needed, replaced by clear-ideas button
        const ideaList = document.getElementById('idea-list');
        const ideaCount = document.getElementById('idea-count');

        function updateCount() {
            ideaCount.textContent = `Total ideas: ${ideaList.children.length}`;
        }
        
        // persist ideas to localStorage so they survive refreshes
        function saveIdeas() {
            const items = Array.from(ideaList.children).map(li => li.textContent);
            localStorage.setItem('ideas', JSON.stringify(items));
        }

        function loadIdeas() {
            const stored = localStorage.getItem('ideas');
            if (stored) {
                try {
                    const items = JSON.parse(stored);
                    items.forEach(text => {
                        const li = document.createElement('li');
                        li.textContent = text;
                        ideaList.appendChild(li);
                    });
                } catch (e) {
                    console.error('Failed to load ideas from storage', e);
                }
            }
            updateCount();
        }

        function addIdea() {
            const text = ideaBox.value.trim();
            const member = document.getElementById('member-select').value;
            if (text === '') return;
            
            // Create the idea text that will be shown
            const ideaText = `${member}${member ? ' - ' : ''}${text}`;
            
            // Check if this idea already exists
            const existingIdeas = Array.from(ideaList.children).map(li => li.textContent);
            if (existingIdeas.includes(ideaText)) {
                alert('This idea has already been added!');
                return;
            }
            
            const li = document.createElement('li');
            li.textContent = ideaText;
            ideaList.appendChild(li);
            ideaBox.value = '';
            updateCount();
            saveIdeas(); // persist immediately
        }

        addButton.addEventListener('click', addIdea);
        // clear-all-ideas button handles resetting form and list
        
        // hook new clear-all-ideas button
        const clearIdeasBtn = document.getElementById('clear-ideas');
        if (clearIdeasBtn) {
            clearIdeasBtn.addEventListener('click', function() {
                // wipe form as well as list
                ideaBox.value = '';
                document.getElementById('member-select').value = '';
                while (ideaList.firstChild) {
                    ideaList.removeChild(ideaList.firstChild);
                }
                updateCount();
                localStorage.removeItem('ideas');
            });
        }
        
        // load stored ideas on page load
        loadIdeas();
        // Section switching
        document.getElementById('gpa-btn').addEventListener('click', () => showSection('gpa-section'));
        document.getElementById('timer-btn').addEventListener('click', () => showSection('timer-section'));
        document.getElementById('idea-btn').addEventListener('click', () => showSection('idea-section'));

        function showSection(sectionId) {
            document.querySelectorAll('main section').forEach(section => {
                section.style.display = section.id === sectionId ? 'block' : 'none';
            });
        }

        // GPA Calculator
        document.getElementById('calculate-gpa').addEventListener('click', calculateGPA);

        function calculateGPA() {
            const courses = document.querySelectorAll('.course');
            let totalPoints = 0;
            let totalCredits = 0;

            courses.forEach(course => {
                const credits = parseFloat(course.querySelector('.credits').value);
                const grade = parseFloat(course.querySelector('.grade').value);
                if (!isNaN(credits) && credits > 0) {
                    totalPoints += grade * credits;
                    totalCredits += credits;
                }
            });

            const gpa = totalCredits ? (totalPoints / totalCredits).toFixed(2) : 0;
            document.getElementById('gpa-result').textContent = `GPA: ${gpa}`;
        }

        // ============================================
        // TIMER LOGIC
        // ============================================
        const POMODORO_DURATION = 25 * 60; // 25 minutes in seconds

        // DOM Elements
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Timer State
        let timerState = {
            totalSeconds: POMODORO_DURATION,
            remainingSeconds: POMODORO_DURATION,
            isRunning: false,
            intervalId: null
        };

        /**
         * Format seconds to MM:SS format
         */
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        /**
         * Update timer display
         */
        function updateDisplay() {
            timerDisplay.textContent = formatTime(timerState.remainingSeconds);
        }

        /**
         * Update button states
         */
        function updateButtonStates() {
            startBtn.disabled = timerState.isRunning;
            pauseBtn.disabled = !timerState.isRunning;
        }

        /**
         * Decrease timer by 1 second
         */
        function decrementTimer() {
            timerState.remainingSeconds--;
            updateDisplay();

            if (timerState.remainingSeconds <= 0) {
                timerState.remainingSeconds = 0;
                timerState.isRunning = false;
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;

                updateButtonStates();
                updateDisplay();
                alert("⏰ Time's up! Take a break.");
            }
        }

        /**
         * Start button handler
         */
        startBtn.addEventListener('click', function() {
            if (timerState.isRunning) return; // Prevent multiple starts

            timerState.isRunning = true;
            updateButtonStates();
            timerDisplay.classList.add('running');

            timerState.intervalId = setInterval(decrementTimer, 1000);
        });

        /**
         * Pause button handler
         */
        pauseBtn.addEventListener('click', function() {
            if (!timerState.isRunning) return;

            timerState.isRunning = false;
            clearInterval(timerState.intervalId);
            timerState.intervalId = null;
            updateButtonStates();
            timerDisplay.classList.remove('running');
        });

        /**
         * Reset button handler
         */
        resetBtn.addEventListener('click', function() {
            if (timerState.intervalId) {
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;
            }

            timerState.isRunning = false;
            timerState.remainingSeconds = timerState.totalSeconds;

            updateDisplay();
            updateButtonStates();
            timerDisplay.classList.remove('running');
        });

        // Initial timer setup
        if (timerDisplay) {
            updateDisplay();
            updateButtonStates();
        }

        // -------------------------------------------------
        // Dark mode toggle logic
        // -------------------------------------------------
        const darkToggle = document.getElementById('dark-mode-toggle');

        function applyDarkMode(enabled) {
            document.body.classList.toggle('dark-mode', enabled);
            // optionally change button text or icon
        }

        // Restore preference from localStorage if available
        const stored = localStorage.getItem('darkModeEnabled');
        if (stored !== null) {
            const enabled = stored === 'true';
            darkToggle.checked = enabled;
            applyDarkMode(enabled);
        }

        darkToggle.addEventListener('change', function() {
            const enabled = darkToggle.checked;
            applyDarkMode(enabled);
            localStorage.setItem('darkModeEnabled', enabled);
        });
    </script>
</body>
</html>
