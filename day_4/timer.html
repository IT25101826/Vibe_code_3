<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCSC Hub - Student Dashboard</title>
    <style>
        /* ============================================
           RESET & BASE STYLES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           NAVBAR STYLES
           ============================================ */
        nav {
            background: #8B0000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 52px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .navbar-brand .gold-text {
            color: #FFD700;
        }

        .nav-tabs {
            display: flex;
            gap: 8px;
        }

        .nav-tab-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            background: transparent;
            color: white;
            transition: all 0.3s ease;
        }

        .nav-tab-btn.active {
            background: #FFD700;
            color: #8B0000;
            font-weight: bold;
        }

        .nav-tab-btn:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .navbar-icon {
            color: white;
            font-size: 20px;
        }

        /* ============================================
           MAIN CONTENT AREA
           ============================================ */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 20px;
        }

        .tab-content {
            display: none;
            width: 100%;
            max-width: 500px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        /* ============================================
           TIMER CARD STYLES
           ============================================ */
        .timer-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.6s ease-out;
        }

        .timer-card h1 {
            font-size: 18px;
            margin-bottom: 24px;
            color: #333;
            font-weight: 600;
        }

        .timer-display {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 32px;
            letter-spacing: 2px;
            color: #8B0000;
            font-variant-numeric: tabular-nums;
            animation: pulseTimer 2s ease-in-out infinite;
        }

        .timer-display.running {
            animation: pulseTimer 1.5s ease-in-out infinite;
        }

        /* ============================================
           TIMER CONTROLS
           ============================================ */
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            min-width: 80px;
        }

        .control-btn:hover:not(:disabled) {
            background: #a00000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
        }

        .control-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-btn.pause-btn {
            background: #555;
        }

        .control-btn.pause-btn:hover:not(:disabled) {
            background: #666;
        }

        /* ============================================
           PLACEHOLDER CONTENT STYLES
           ============================================ */
        .placeholder-content {
            color: #555;
            font-size: 20px;
            font-weight: 500;
            animation: slideUp 0.6s ease-out;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseTimer {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 600px) {
            nav {
                flex-wrap: wrap;
                justify-content: center;
                height: auto;
                padding: 8px;
                gap: 8px;
            }

            .navbar-brand {
                width: 100%;
                text-align: center;
                order: -1;
            }

            .nav-tabs {
                width: 100%;
                justify-content: center;
            }

            .navbar-icon {
                width: 100%;
                text-align: center;
            }

            .timer-card {
                padding: 30px 20px;
            }

            .timer-display {
                font-size: 48px;
                margin-bottom: 24px;
            }

            .control-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 400px) {
            .timer-display {
                font-size: 40px;
            }

            .timer-card {
                padding: 24px 16px;
            }

            .nav-tab-btn {
                padding: 4px 10px;
                font-size: 12px;
            }

            .control-btn {
                padding: 8px 12px;
                font-size: 12px;
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="navbar-brand">
            UCSC <span class="gold-text">Hub</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab-btn active" data-tab="Study Timer">Study Timer</button>
            <button class="nav-tab-btn" data-tab="Idea Board">Idea Board</button>
            <button class="nav-tab-btn" data-tab="GPA Calc">GPA Calc</button>
        </div>
        <div class="navbar-icon">🕐</div>
    </nav>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Study Timer Tab -->
        <div id="Study Timer" class="tab-content active">
            <div class="timer-card">
                <h1>⏳ Study Timer</h1>
                <div id="timerDisplay" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="startBtn" class="control-btn">Start</button>
                    <button id="pauseBtn" class="control-btn pause-btn">Pause</button>
                    <button id="resetBtn" class="control-btn">Reset</button>
                </div>
            </div>
        </div>

        <!-- Idea Board Tab (Placeholder) -->
        <div id="Idea Board" class="tab-content">
            <div class="placeholder-content">💡 Idea Board coming soon...</div>
        </div>

        <!-- GPA Calc Tab (Placeholder) -->
        <div id="GPA Calc" class="tab-content">
            <div class="placeholder-content">📊 GPA Calc coming soon...</div>
        </div>
    </div>

    <script>
        // ============================================
        // TAB SWITCHING LOGIC
        // ============================================
        const navButtons = document.querySelectorAll('.nav-tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        navButtons.forEach(button => {
            button.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');

                // Remove active class from all buttons and tabs
                navButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(tab => tab.classList.remove('active'));

                // Add active class to clicked button and corresponding tab
                this.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // ============================================
        // TIMER LOGIC
        // ============================================
        const POMODORO_DURATION = 25 * 60; // 25 minutes in seconds

        // DOM Elements
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Timer State
        let timerState = {
            totalSeconds: POMODORO_DURATION,
            remainingSeconds: POMODORO_DURATION,
            isRunning: false,
            intervalId: null
        };

        /**
         * Format seconds to MM:SS format
         */
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        /**
         * Update timer display
         */
        function updateDisplay() {
            timerDisplay.textContent = formatTime(timerState.remainingSeconds);
        }

        /**
         * Update button states
         */
        function updateButtonStates() {
            startBtn.disabled = timerState.isRunning;
            pauseBtn.disabled = !timerState.isRunning;
        }

        /**
         * Decrease timer by 1 second
         */
        function decrementTimer() {
            timerState.remainingSeconds--;
            updateDisplay();

            if (timerState.remainingSeconds <= 0) {
                timerState.remainingSeconds = 0;
                timerState.isRunning = false;
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;

                updateButtonStates();
                updateDisplay();
                alert("⏰ Time's up! Take a break.");
            }
        }

        /**
         * Start button handler
         */
        startBtn.addEventListener('click', function() {
            if (timerState.isRunning) return; // Prevent multiple starts

            timerState.isRunning = true;
            updateButtonStates();
            timerDisplay.classList.add('running');

            timerState.intervalId = setInterval(decrementTimer, 1000);
        });

        /**
         * Pause button handler
         */
        pauseBtn.addEventListener('click', function() {
            if (!timerState.isRunning) return;

            timerState.isRunning = false;
            clearInterval(timerState.intervalId);
            timerState.intervalId = null;
            updateButtonStates();
            timerDisplay.classList.remove('running');
        });

        /**
         * Reset button handler
         */
        resetBtn.addEventListener('click', function() {
            if (timerState.intervalId) {
                clearInterval(timerState.intervalId);
                timerState.intervalId = null;
            }

            timerState.isRunning = false;
            timerState.remainingSeconds = timerState.totalSeconds;

            updateDisplay();
            updateButtonStates();
            timerDisplay.classList.remove('running');
        });

        // Initial setup
        updateDisplay();
        updateButtonStates();
    </script>
</body>
</html>
